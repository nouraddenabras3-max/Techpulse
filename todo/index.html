<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do List</title>
</head>
<body>
    <div class="todo-container">
        <h1>To-Do List</h1>
        <input type="text" id="task-input" placeholder="New Task">
        <button id="add-task">Add</button>
        <div class="filter-buttons">
            <button id="filter-all">All</button>
            <button id="filter-active">Active</button>
            <button id="filter-completed">Completed</button>
        </div>
        <div class="stats">
            <p>Total: <span id="total-tasks">0</span></p>
            <p>Completed: <span id="completed-tasks">0</span></p>
            <p>Remaining: <span id="remaining-tasks">0</span></p>
        </div>
        <ul id="todo-list"></ul>
        <button id="clear-completed">Clear Completed</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
